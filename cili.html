<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>种子转磁力</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
body{background:#f5f7fa;padding:1.5rem;}
.card{max-width:600px;margin:0 auto;background:#fff;border-radius:20px;padding:2rem 1.5rem;box-shadow:0 8px 30px #0000000c;}
h2{text-align:center;color:#222;margin-bottom:1.5rem;}
.upload-box{border:2px dashed #4096ff;border-radius:16px;padding:3rem 1rem;text-align:center;color:#4096ff;margin-bottom:1rem;cursor:pointer;}
.upload-box:hover{background:#f0f7ff;}
input{display:none;}
.res{background:#f8f9fa;border-radius:12px;padding:1rem;margin-top:1rem;word-break:break-all;}
textarea{width:100%;height:90px;border:1px solid #ddd;border-radius:8px;padding:.8rem;margin:.5rem 0;}
.btn{background:#4096ff;color:#fff;border:0;padding:.6rem 1.2rem;border-radius:8px;cursor:pointer;}
.tip{text-align:center;color:#666;font-size:.9rem;margin-top:1rem;}
.foot{text-align:center;color:#999;font-size:.85rem;margin-top:2rem;}
</style>
</head>
<body>
<div class="card">
  <h2>🌱 种子转磁力 · 本地版</h2>
  <label class="upload-box" for="fileinp">
    点击选择 .torrent 文件
    <input id="fileinp" type="file" accept=".torrent"/>
  </label>
  <div id="out"></div>
  <div class="tip">⚠️纯本地运算，不上传任何数据</div>
</div>
<div class="foot">北沐@3523781463 提供</div>

<script>
// 极简原生解析torrent获取info_hash，无任何外部依赖
async function readTorrent(file){
  return new Promise((ok)=>{
    const r=new FileReader();
    r.onload=e=>{
      const arr=new Uint8Array(e.target.result);
      let pos=findInfoStart(arr);
      let end=findInfoEnd(arr,pos);
      const sub=arr.subarray(pos,end);
      ok(sha1Hex(sub));
    };
    r.readAsArrayBuffer(file);
  });
}
function findInfoStart(d){
  for(let i=0;i<d.length-10;i++){
    if(d[i]===105&&d[i+1]===110&&d[i+2]===102&&d[i+3]===111)return i+7;
  }
  return 0;
}
function findInfoEnd(d,s){
  let c=0;
  for(let i=s;i<d.length;i++){
    if(d[i]===123)c++;
    if(d[i]===125){c--;if(c===0)return i+1;}
  }
  return d.length;
}
function sha1Hex(buf){
  return crypto.subtle.digest("SHA-1",buf)
  .then(h=>Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,0)).join(""));
}

document.getElementById("fileinp").onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  try{
    const hash=await readTorrent(f);
    const mag=`magnet:?xt=urn:btih:${hash}&dn=${encodeURIComponent(f.name.replace(".torrent",""))}`;
    document.getElementById("out").innerHTML=`
    <div class="res">
      <p><strong>InfoHash：</strong>${hash}</p>
      <textarea id="mstr">${mag}</textarea>
      <button class="btn" onclick="cp()">一键复制磁力</button>
    </div>
    `;
  }catch(err){alert("解析失败，请换Chrome/Edge浏览器打开");}
};
function cp(){
  const t=document.getElementById("mstr");
  t.select();document.execCommand("copy");alert("复制成功！");
}
</script>
</body>
</html>
