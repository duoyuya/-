<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>种子转磁力</title>
<script src="https://cdn.jsdelivr.net/npm/bencode@2.0.2/bencode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Sans-Serif;}
body{background:#f5f7fa;padding:1.5rem;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card{background:#fff;border-radius:20px;padding:2rem 1.5rem;box-shadow:0 8px 30px rgba(0,0,0,0.08);width:100%;max-width:600px;}
h2{color:#1a1a1a;margin-bottom:1.5rem;text-align:center;font-size:1.8rem;}
.upload-area{border:2px dashed #4096ff;border-radius:16px;padding:2.5rem 1rem;text-align:center;cursor:pointer;color:#4096ff;margin-bottom:1.5rem;transition:all .3s ease;font-size:1.1rem;}
.upload-area:hover{background:#f0f7ff;border-color:#297acc;}
input[type=file]{display:none;}
.res-box{background:#f8f9fa;border-radius:12px;padding:1.2rem;margin-top:1rem;word-break:break-all;}
textarea{width:100%;height:100px;border:1px solid #e5e7eb;border-radius:8px;padding:.8rem;margin:.8rem 0;resize:none;font-size:.95rem;}
.btn{background:#4096ff;color:#fff;border:none;padding:.7rem 1.5rem;border-radius:10px;cursor:pointer;transition:all .3s ease;font-size:1rem;}
.btn:hover{background:#297acc;transform:translateY(-1px);}
.tip{color:#666;font-size:.9rem;margin-top:1rem;text-align:center;line-height:1.5;}
.footer{margin-top:1.5rem;color:#888;font-size:.85rem;text-align:center;}
</style>
</head>
<body>
<div class="card">
  <h2>🌱 种子转磁力 · 本地美化版</h2>
  <label class="upload-area" for="torrentFile">
    点击此处选择 .torrent 种子文件
    <input id="torrentFile" type="file" accept=".torrent"/>
  </label>
  <div id="result"></div>
  <div class="tip">⚠️ 全程浏览器本地计算，不上传任何文件，隐私安全</div>
</div>
<div class="footer">北沐@3523781463 提供</div>

<script>
// 计算BTIH InfoHash核心逻辑
function getInfoHash(buf){
  const uint8 = new Uint8Array(buf);
  const decoded = bencode.decode(uint8);
  const encodedInfo = bencode.encode(decoded.info);
  const wordArray = Crypto-js.lib.WordArray.create(encodedInfo);
  const sha1 = Crypto-js.algo.SHA1.create();
  sha1.update(wordArray);
  return sha1.finalize().toString();
}

// 监听上传
document.getElementById('torrentFile').onchange = async e => {
  const file = e.target.files[0];
  if(!file)return;
  const buf = await file.arrayBuffer();
  const hash = getInfoHash(buf);
  const magnet = `magnet:?xt=urn:btih:${hash}&dn=${encodeURIComponent(file.name.replace('.torrent',''))}`;
  
  const html = `
  <div class="res-box">
    <p><strong>InfoHash：</strong>${hash}</p>
    <textarea readonly id="magText">${magnet}</textarea>
    <button class="btn" onclick="copyMag()">一键复制磁力</button>
  </div>
  `;
  document.getElementById('result').innerHTML = html;
};

function copyMag(){
  const el = document.getElementById('magText');
  el.select();
  document.execCommand('copy');
  alert('✅ 复制成功，可粘贴到下载器使用！');
}
</script>
</body>
</html>
